<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monotropism — An Interest-Based Account of Autism</title>
<meta name="description" content="Monotropism: a cognitive theory of autism developed by Dinah Murray, Wenn Lawson, and Mike Lesser. A growing library of research drafts and neuroaffirming guides, available in several languages.">
<meta name="author" content="PieBru">

<!-- Prevent theme flash: read stored/saved theme before paint -->
<script>
(function () {
  try {
    var t = localStorage.getItem("mono-theme");
    if (t !== "light" && t !== "dark") t = "light"; /* default light */
    document.documentElement.setAttribute("data-theme", t);
  } catch (e) {}
})();
</script>

<style>
/* ============================================================
   Monotropism — landing page
   Single file. Modern, minimalistic. Dark by default.
   To add a research draft, append an object to DOCS below.
   ============================================================ */

:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
    Helvetica, Arial, sans-serif;
  --font-serif: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
    Helvetica, Arial, sans-serif;

  --maxw: 1080px;
  --radius: 14px;
  --radius-sm: 9px;
}

/* ---- Dark theme (default) ---- */
[data-theme="dark"] {
  --bg:        #0d0f13;
  --bg-grad-a: #0d0f13;
  --bg-grad-b: #0f1218;
  --surface:   #14171e;
  --surface-2: #181c25;
  --surface-hi:#1d222c;
  --fg:        #e9ebf0;
  --fg-soft:   #aeb4c0;
  --fg-faint:  #767d8c;
  --border:    #232833;
  --border-soft:#1b1f27;
  --accent:    #8aa6ff;
  --accent-fg: #0d0f13;
  --accent-2:  #6d86e6;
  --accent-bg: rgba(138,166,255,0.12);
  --accent-ring: rgba(138,166,255,0.35);
  --glow:      rgba(138,166,255,0.16);
  --shadow:    0 10px 40px rgba(0,0,0,0.45);
  --shadow-sm: 0 2px 10px rgba(0,0,0,0.35);
  --selection: rgba(138,166,255,0.28);

  /* Category accent colours (blog cards & chips) */
  --cat-theory: #a78bfa;
  --cat-practitioner: #5ec9b6;
  --cat-family: #f0b86e;
  --cat-kids: #7bd99a;
}

/* ---- Light theme ---- */
[data-theme="light"] {
  --bg:        #f6f7f9;
  --bg-grad-a: #f7f8fa;
  --bg-grad-b: #eef0f4;
  --surface:   #ffffff;
  --surface-2: #ffffff;
  --surface-hi:#f2f4f8;
  --fg:        #1a1d24;
  --fg-soft:   #4c5363;
  --fg-faint:  #838b9a;
  --border:    #e4e8ee;
  --border-soft:#eef1f5;
  --accent:    #2f5fae;
  --accent-fg: #ffffff;
  --accent-2:  #264f93;
  --accent-bg: rgba(47,95,174,0.09);
  --accent-ring: rgba(47,95,174,0.30);
  --glow:      rgba(47,95,174,0.12);
  --shadow:    0 12px 40px rgba(20,30,55,0.10);
  --shadow-sm: 0 1px 6px rgba(20,30,55,0.06);
  --selection: rgba(47,95,174,0.18);

  /* Category accent colours (blog cards & chips) */
  --cat-theory: #6d4fc4;
  --cat-practitioner: #1f9c86;
  --cat-family: #c98a2e;
  --cat-kids: #2f9e5f;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  background:
    radial-gradient(1100px 560px at 50% -8%, var(--glow), transparent 60%),
    linear-gradient(180deg, var(--bg-grad-a), var(--bg-grad-b));
  background-attachment: fixed;
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: 16.5px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  transition: background-color .4s ease, color .4s ease;
}
::selection { background: var(--selection); }

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; text-underline-offset: 2px; }

.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 22px; }

/* ---------- Brand mark (attention tunnel) ---------- */
.mark { display: inline-block; width: 1em; height: 1em; color: var(--accent); flex: none; }

/* ============================================================
   Top bar
   ============================================================ */
.topbar {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: saturate(140%) blur(12px);
  -webkit-backdrop-filter: saturate(140%) blur(12px);
  background: color-mix(in srgb, var(--bg) 78%, transparent);
  border-bottom: 1px solid var(--border-soft);
}
.topbar-inner {
  max-width: var(--maxw); margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; padding: 11px 22px;
}
.tb-left, .tb-right { display: flex; align-items: center; gap: 10px; }

.brand {
  display: inline-flex; align-items: center; gap: 9px;
  color: var(--fg); font-family: var(--font-serif);
  font-weight: 600; font-size: 18px; letter-spacing: -0.01em;
}
.brand:hover { text-decoration: none; color: var(--fg); }
.brand .mark { font-size: 22px; }
.brand-stack { display: flex; flex-direction: column; line-height: 1.12; }
.brand-motto {
  font-family: var(--font-sans);
  font-size: 11px; font-weight: 500;
  color: var(--fg-faint);
  letter-spacing: 0.01em;
  margin-top: 1px;
}

.iconbtn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  height: 38px; min-width: 38px; padding: 0 11px;
  font-family: var(--font-sans); font-size: 14px; font-weight: 500;
  color: var(--fg-soft);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: background .18s ease, color .18s ease, border-color .18s ease, transform .08s ease;
}
.iconbtn:hover { color: var(--fg); border-color: var(--accent); background: var(--surface-hi); }
.iconbtn:active { transform: translateY(1px); }
.iconbtn svg { width: 17px; height: 17px; }
.iconbtn.theme { padding: 0; width: 38px; }

/* Language switch dropdown */
.langswitch { position: relative; }
.langswitch .iconbtn .code { font-weight: 600; color: var(--fg); }
.langmenu {
  position: absolute; right: 0; top: calc(100% + 8px);
  min-width: 190px; padding: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow);
  z-index: 60;
}
.langmenu[hidden] { display: none; }
.langmenu-item {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 9px 10px; border: 0; background: transparent;
  font-family: var(--font-sans); font-size: 14.5px; color: var(--fg-soft);
  border-radius: 7px; cursor: pointer; text-align: left;
  transition: background .14s ease, color .14s ease;
}
.langmenu-item:hover { background: var(--surface-hi); color: var(--fg); }
.langmenu-item .flag { font-size: 17px; }
.langmenu-item.active { color: var(--accent); font-weight: 600; }
.langmenu-item .mi { margin-left: auto; opacity: 0; color: var(--accent); }
.langmenu-item.active .mi { opacity: 1; }

/* ============================================================
   Home (language selection)
   ============================================================ */
.home { padding: clamp(48px, 9vh, 96px) 0 64px; text-align: center; }
.home-hero { display: flex; flex-direction: column; align-items: center; }
.home .mark-big {
  font-size: 60px; color: var(--accent);
  filter: drop-shadow(0 0 28px var(--glow));
  margin-bottom: 6px;
}
.home h1 {
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: clamp(40px, 8vw, 68px);
  letter-spacing: -0.025em;
  line-height: 1.02;
  margin: 6px 0 4px;
}
.home .tagline {
  font-family: var(--font-serif);
  font-style: italic;
  color: var(--fg-soft);
  font-size: clamp(17px, 2.4vw, 22px);
  margin: 0 0 8px;
}
.home .eyebrow {
  font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--fg-faint); margin: 18px 0 6px;
}
.home .lead {
  max-width: 560px; margin: 0 auto;
  color: var(--fg-soft); font-size: 15.5px; line-height: 1.7;
}
.home .summary { /* executive summary on the home hero */
  max-width: 660px; font-size: 16px; line-height: 1.72;
}

/* Self-assessment tool callout (e.g. Monotropism Questionnaire) */
.tool-card {
  margin: 40px auto 0; max-width: 720px; text-align: left;
  display: flex; align-items: center; gap: 22px; flex-wrap: wrap;
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--accent); border-radius: var(--radius);
  padding: 20px 22px; box-shadow: var(--shadow);
}
.tool-main { flex: 1 1 280px; min-width: 240px; }
.tool-eyebrow { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent); font-weight: 700; }
.tool-title { margin: 4px 0 6px; font-size: 20px; letter-spacing: -0.01em; }
.tool-desc { margin: 0; color: var(--fg-soft); font-size: 14.5px; line-height: 1.6; }
.tool-actions { display: flex; flex-direction: column; gap: 8px; flex: 0 0 auto; }
.tool-actions .btn { justify-content: center; }
@media (max-width: 640px) {
  .tool-card { flex-direction: column; align-items: stretch; text-align: center; }
  .tool-actions { width: 100%; flex-direction: row; }
  .tool-actions .btn { flex: 1; }
}

/* Native language dropdown (home view, top bar) */
.langselect {
  font-family: var(--font-sans);
  font-size: 14px; font-weight: 600;
  color: var(--fg);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  height: 38px;
  padding: 0 30px 0 12px;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  background-image:
    linear-gradient(45deg, transparent 50%, var(--fg-soft) 50%),
    linear-gradient(135deg, var(--fg-soft) 50%, transparent 50%);
  background-position: calc(100% - 14px) 17px, calc(100% - 9px) 17px;
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
  transition: border-color .16s ease, color .16s ease;
}
.langselect:hover { border-color: var(--accent); color: var(--fg); }
.langselect:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); }
html[dir="rtl"] .langselect { padding: 0 12px 0 30px; background-position: 14px 17px, 9px 17px; }
html[dir="rtl"] .doc { flex-direction: row-reverse; }

/* ============================================================
   Language landing view
   ============================================================ */
.langview { padding: clamp(36px, 6vh, 64px) 0 72px; }
.lang-hero { text-align: center; max-width: 760px; margin: 0 auto 48px; }
.lang-hero .mark-big {
  font-size: 44px; color: var(--accent);
  filter: drop-shadow(0 0 22px var(--glow));
}
.lang-hero h1 {
  font-family: var(--font-serif); font-weight: 600;
  font-size: clamp(32px, 6vw, 50px);
  letter-spacing: -0.02em; line-height: 1.05;
  margin: 8px 0 4px;
}
.lang-hero .tagline {
  font-family: var(--font-serif); font-style: italic;
  color: var(--fg-soft); font-size: clamp(16px, 2.2vw, 20px);
  margin: 2px 0 18px;
}
.lang-hero .intro { color: var(--fg-soft); font-size: 16px; margin: 0 auto; max-width: 640px; }

.section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
  margin-bottom: 8px;
}
.section-head h2 {
  font-family: var(--font-serif); font-weight: 600;
  font-size: clamp(22px, 3.4vw, 28px); letter-spacing: -0.01em; margin: 0;
}
.section-head .count {
  font-size: 13px; color: var(--fg-faint);
  background: var(--surface); border: 1px solid var(--border-soft);
  padding: 4px 10px; border-radius: 999px;
}
.divider { height: 1px; background: var(--border); margin: 10px 0 22px; }

.cat { margin-bottom: 40px; }
.cat-title {
  font-family: var(--font-sans); font-weight: 600;
  font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--accent); margin: 0 0 14px;
}
.cat-list { display: flex; flex-direction: column; gap: 14px; }

/* Document card */
.doc {
  display: flex; gap: 20px; align-items: center;
  padding: 22px 24px;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  transition: border-color .18s ease, background .18s ease, transform .18s ease, box-shadow .18s ease;
}
.doc:hover { border-color: var(--border); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
.doc-main { flex: 1 1 auto; min-width: 0; }
.doc .audience {
  display: inline-block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--fg-faint); margin-bottom: 6px;
}
.doc-title {
  font-family: var(--font-serif); font-weight: 600;
  font-size: clamp(18px, 2.4vw, 21px); line-height: 1.3;
  margin: 0 0 6px; color: var(--fg);
}
.doc-desc { margin: 0; color: var(--fg-soft); font-size: 15px; line-height: 1.6; }
.doc-actions { flex: 0 0 auto; display: flex; gap: 9px; align-items: center; }

/* ============================================================
   Research drafts — blog-style index
   ============================================================ */
.blog-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px; flex-wrap: wrap; margin-bottom: 8px;
}
.blog-head h2 {
  font-family: var(--font-serif); font-weight: 600;
  font-size: clamp(22px, 3.4vw, 28px); letter-spacing: -0.01em; margin: 0 0 4px;
}
.blog-head .count { align-self: center; }
.blog-sub { margin: 0; color: var(--fg-faint); font-size: 14.5px; max-width: 620px; }

/* category filter chips */
.filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0 26px; }
.chip {
  display: inline-flex; align-items: center; font-family: var(--font-sans);
  font-size: 13px; font-weight: 600; letter-spacing: 0.01em;
  padding: 7px 14px; border-radius: 999px; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface); color: var(--fg-soft);
  transition: color .15s ease, border-color .15s ease, background .15s ease;
}
.chip:hover { color: var(--fg); border-color: var(--fg-faint); }
.chip.active { color: var(--fg); border-color: var(--accent); background: var(--accent-bg); }
.chip.sm { font-size: 10.5px; letter-spacing: 0.04em; text-transform: uppercase; padding: 3px 9px; cursor: default; }
.chip.sm:hover { color: inherit; border-color: inherit; background: inherit; }
.chip.cat-theory       { color: var(--cat-theory);       border-color: color-mix(in srgb, var(--cat-theory) 45%, transparent);       background: color-mix(in srgb, var(--cat-theory) 12%, transparent); }
.chip.cat-practitioner { color: var(--cat-practitioner); border-color: color-mix(in srgb, var(--cat-practitioner) 45%, transparent); background: color-mix(in srgb, var(--cat-practitioner) 12%, transparent); }
.chip.cat-family       { color: var(--cat-family);       border-color: color-mix(in srgb, var(--cat-family) 45%, transparent);       background: color-mix(in srgb, var(--cat-family) 12%, transparent); }
.chip.cat-kids         { color: var(--cat-kids);         border-color: color-mix(in srgb, var(--cat-kids) 45%, transparent);         background: color-mix(in srgb, var(--cat-kids) 12%, transparent); }

/* card grid */
.blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 18px; }
.bcard {
  position: relative; display: flex; flex-direction: column;
  background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius);
  padding: 20px 20px 16px; overflow: hidden;
  transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
}
.bcard:hover { border-color: var(--border); box-shadow: var(--shadow-sm); transform: translateY(-2px); }
/* category accent strip (left edge) */
.bcard::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--cat-theory); }
.bcard.cat-practitioner::before { background: var(--cat-practitioner); }
.bcard.cat-family::before       { background: var(--cat-family); }
.bcard.cat-kids::before         { background: var(--cat-kids); }
.bcard-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; min-height: 22px; }
.bcard-meta { display: flex; align-items: center; gap: 8px; }
.bdate { font-size: 12px; color: var(--fg-faint); font-variant-numeric: tabular-nums; white-space: nowrap; }
.new-badge { font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--accent); background: var(--accent-bg); border: 1px solid var(--accent-ring);
  padding: 2px 8px; border-radius: 999px; }
.bcard-title { font-family: var(--font-serif); font-weight: 600; font-size: clamp(18px, 2.2vw, 21px);
  line-height: 1.3; margin: 0 0 8px; }
.bcard-title a { color: var(--fg); }
.bcard-title a:hover { color: var(--accent); text-decoration: none; }
.bcard-desc { margin: 0; color: var(--fg-soft); font-size: 14.5px; line-height: 1.6; flex: 1 1 auto; }
.bcard-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px;
  margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border-soft); flex-wrap: wrap; }
.baud { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-faint); }
.bcard-actions { display: flex; gap: 8px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-sans); font-size: 14px; font-weight: 600;
  padding: 9px 15px; border-radius: 10px; border: 1px solid transparent;
  cursor: pointer; white-space: nowrap;
  transition: background .16s ease, color .16s ease, border-color .16s ease, transform .08s ease;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--accent); color: var(--accent-fg); }
.btn-primary:hover { background: var(--accent-2); text-decoration: none; }
.btn-ghost { background: transparent; color: var(--fg-soft); border-color: var(--border); }
.btn-ghost:hover { color: var(--fg); border-color: var(--accent); text-decoration: none; }
.btn-ghost.active { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }
.btn .ar { font-size: 12px; opacity: .85; }

/* ============================================================
   Footer
   ============================================================ */
.site-footer {
  border-top: 1px solid var(--border-soft);
  padding: 30px 0 46px;
  font-size: 12.5px; color: var(--fg-faint);
  text-align: center; line-height: 1.7;
}
.site-footer .meta-line { max-width: 780px; margin: 0 auto 10px; }
.site-footer a { color: var(--fg-soft); }
.site-footer .github-line { color: var(--fg-faint); }
.site-footer .github-line a { font-weight: 500; }
.site-footer .sep { opacity: .5; margin: 0 8px; }

/* Scientific Sources page */
.srcview { padding: clamp(36px, 6vh, 64px) 0 72px; }
.src-head { max-width: 760px; margin: 0 0 24px; }
.src-head h1 {
  font-family: var(--font-serif); font-weight: 600;
  font-size: clamp(26px, 4.6vw, 38px); letter-spacing: -0.02em;
  margin: 0 0 10px;
}
.src-intro { color: var(--fg-soft); font-size: 15px; line-height: 1.65; margin: 0; }

/* ---------- References (source archive on the home page) ---------- */
.refs { padding: 0 0 40px; }
.refs-details {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  padding: 4px 22px;
}
.refs-details > summary {
  list-style: none; cursor: pointer;
  display: flex; align-items: baseline; justify-content: space-between; gap: 14px;
  padding: 16px 0; flex-wrap: wrap;
}
.refs-details > summary::-webkit-details-marker { display: none; }
.refs-title {
  font-family: var(--font-serif); font-weight: 600;
  font-size: clamp(18px, 2.6vw, 22px); letter-spacing: -0.01em;
}
.refs-title::before { content: "\25B8\00a0"; color: var(--accent); transition: transform .18s ease; display: inline-block; }
.refs-details[open] .refs-title::before { content: "\25BE\00a0"; }
.refs-sub { font-size: 13px; color: var(--fg-faint); }
.refs-intro { color: var(--fg-soft); font-size: 14.5px; margin: 4px 0 16px; max-width: 680px; }
.ref-list { list-style: none; margin: 0; padding: 0; }
.ref {
  display: grid;
  grid-template-columns: 34px 1fr auto; align-items: baseline; gap: 12px;
  padding: 11px 0; border-top: 1px solid var(--border-soft);
}
.ref-n { font-family: var(--font-sans); font-size: 12.5px; font-weight: 600; color: var(--accent); }
.ref-cite { font-size: 14.5px; line-height: 1.55; color: var(--fg); }
.ref-links { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: flex-end; }
.ref-local {
  font-family: var(--font-sans); font-size: 12px; font-weight: 600;
  padding: 3px 9px; border-radius: 6px;
  background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-ring);
  white-space: nowrap;
}
.ref-local:hover { background: var(--accent); color: var(--accent-fg); text-decoration: none; }
.ref-orig { font-size: 12.5px; color: var(--fg-faint); white-space: nowrap; }
.ref-orig:hover { color: var(--accent); text-decoration: none; }
.ref-badge {
  font-family: var(--font-sans); font-size: 11.5px;
  padding: 3px 9px; border-radius: 6px;
  border: 1px dashed var(--border); color: var(--fg-faint); white-space: nowrap;
}
@media (max-width: 640px) {
  .ref { grid-template-columns: 28px 1fr; }
  .ref-links { grid-column: 2; justify-content: flex-start; margin-top: 2px; }
}

/* view fade */
.view { animation: fade .4s ease both; }

/* ============================================================
   Routing
   ============================================================ */
let currentLang = "en";

function parseHash() {
  const parts = location.hash.replace(/^#\/?/, "").split("/").filter(Boolean);
  if (parts[0] === "sources") return { section: "sources", code: currentLang };
  const code = parts[0] && I18N[parts[0]] ? parts[0] : "en";
  const section = parts[1] === "drafts" ? "drafts" : "landing";
  return { section, code };
}

function setLangDir(code) {
  document.documentElement.lang = code;
  document.documentElement.dir = (code === "ar") ? "rtl" : "ltr";
}

function route() {
  const { section, code } = parseHash();
  currentLang = code;
  if (section === "sources") renderSources();
  else if (section === "drafts") renderDrafts(code);
  else renderLanding(code);
  window.scrollTo({ top: 0, behavior: "auto" });
}

/* ============================================================
   Top bar
   ============================================================ */
function renderTopbar(section, code) {
  const i18n = I18N[code];
  const isDark = document.documentElement.getAttribute("data-theme") !== "light";
  const themeIcon = isDark ? SUN : MOON;

  const langSelect = `
    <select class="langselect" data-action="select-lang" aria-label="${esc(i18n.choose)}">
      ${LANGS.map(l => `<option value="${l.code}"${l.code === code ? " selected" : ""}>${l.flag}\u00A0${esc(I18N[l.code].name)}</option>`).join("")}
    </select>`;

  // Quick guides are English-only for now; switch to guidelines_<code>.html once localized
  const guidesHref = "guidelines.html#/" + code;
  const nav = (label, href, route, active) =>
    `<a class="btn btn-ghost${active ? " active" : ""}" ${route ? `data-route="${route}" ` : ""}href="${href}">${esc(label)} <span class="ar">↗</span></a>`;
  const draftsBtn   = nav(i18n.draftsBtn,  "#/" + code + "/drafts", "/" + code + "/drafts", section === "drafts");
  const guidesBtn   = nav(i18n.guidesBtn,  guidesHref, "", false);
  const sourcesBtn  = nav(i18n.sourcesBtn, "#/sources", "/sources", section === "sources");

  document.getElementById("topbar").innerHTML = `
    <div class="tb-left">
      <a class="brand" href="#/${code}" data-route="/${code}" aria-label="${esc(i18n.title)} \u2014 ${esc(i18n.home)}">
        ${MARK}<span class="brand-stack">
          <span class="brand-name">${esc(i18n.title)}</span>
          <span class="brand-motto">${esc(i18n.motto)}</span>
        </span>
      </a>
    </div>
    <div class="tb-right">
      ${langSelect}
      ${guidesBtn}${draftsBtn}${sourcesBtn}
      <button class="iconbtn theme" data-action="toggle-theme" aria-label="${esc(i18n.theme)}" title="${esc(i18n.theme)}">${themeIcon}</button>
    </div>`;
}

    document.querySelectorAll("#filterBar .chip").forEach(c => c.classList.toggle("active", c === chip));
    const f = chip.getAttribute("data-filter");
    grid.querySelectorAll(".bcard").forEach(card => {
      const show = (f === "all") || (card.getAttribute("data-cat") === f);
      card.style.display = show ? "" : "none";
    });
  });

  renderFooter(code);
}

function docCard(doc, code, t, maxDate) {
  const c = doc.content[code];
  const { html, pdf } = artifacts(doc.stem, code);
  const cat = doc.cat;
  const dateStr = doc.date ? fmtDate(doc.date, code) : "";
  // “new” only for the newest date-batch in the feed (meaningful, self-adjusting).
  const isNew = doc.date && maxDate && doc.date === maxDate;
  return `
    <article class="bcard cat-${cat}" data-cat="${cat}">
      <div class="bcard-top">
        <span class="chip cat-${cat} sm">${esc(t.cat[cat] || cat)}</span>
        <span class="bcard-meta">
          ${dateStr ? `<time class="bdate" datetime="${esc(doc.date)}">${esc(dateStr)}</time>` : ""}
          ${isNew ? `<span class="new-badge">new</span>` : ""}
        </span>
      </div>
      <h3 class="bcard-title"><a href="${esc(html)}" target="_blank" rel="noopener">${esc(c.title)}</a></h3>
      <p class="bcard-desc">${esc(c.desc)}</p>
      <div class="bcard-foot">
        <span class="baud">${esc(c.audience)}</span>
        <span class="bcard-actions">
          <a class="btn btn-primary" href="${esc(html)}" target="_blank" rel="noopener">${esc(t.read)} <span class="ar" aria-hidden="true">\u2192</span></a>
          <a class="btn btn-ghost" href="${esc(pdf)}" target="_blank" rel="noopener" download>${esc(t.pdf)} <span class="ar" aria-hidden="true">\u2193</span></a>
        </span>
      </div>
    </article>`;
}

/* ---------- references list (shared Scientific Sources page) ---------- */
function renderReferencesList() {
  const rows = SOURCES.map(s => {
    const local = s.local
      ? `<a class="ref-local" href="${esc(s.local)}" target="_blank" rel="noopener">${s.kind === "pdf" ? "PDF" : "HTML"}</a>`
      : `<span class="ref-badge ${s.access}">${s.access === "oapublisher" ? "free to read (publisher)" : "abstract / paywalled"}</span>`;
    const extra = s.extra ? ` <a class="ref-orig" href="${esc(s.extra)}" target="_blank" rel="noopener">questionnaire <span class="ar" aria-hidden="true">\u2197</span></a>` : "";
    return `<li class="ref">
        <span class="ref-n">[${esc(s.n)}]</span>
        <span class="ref-cite">${esc(s.cite)}</span>
        <span class="ref-links">${local}<a class="ref-orig" href="${esc(s.url)}" target="_blank" rel="noopener">original <span class="ar" aria-hidden="true">\u2197</span></a>${extra}</span>
      </li>`;
  }).join("");
  return `<ul class="ref-list">${rows}</ul>`;
}

/* ============================================================
   Scientific Sources view (one page, shared across all languages)
   ============================================================ */
function renderSources() {
  const code = currentLang;
  setLangDir(currentLang === "ar" ? "ar" : "en");
  document.title = "Scientific Sources \u2014 Monotropism";
  renderTopbar("sources", code);
  document.getElementById("app").innerHTML = `
    <section class="srcview view">
      <div class="wrap">
        <div class="src-head">
          <h1>Scientific Sources</h1>
          <p class="src-intro">Static, locally archived copies of the primary sources cited in the foundational brief <em>Monotropism: An Interest-Based Account of Autism</em>. This list is in English and is shared across all languages; a few peer-reviewed papers link out to the publisher page (free-to-read or paywalled) instead of a local copy.</p>
        </div>
        ${renderReferencesList()}
      </div>
    </section>`;
  renderFooter(code);
}

/* ---------- footer ---------- */
function renderFooter(code) {
  const f = I18N[code] || I18N.en;
  document.getElementById("footer").innerHTML = `
    <div class="wrap">
      <p class="meta-line">${esc(f.footer)} <span class="sep" aria-hidden="true">·</span> ${esc(f.aiNote)} <span class="sep" aria-hidden="true">·</span> ${esc(f.gdpr)}</p>
      <p class="github-line"><a href="${REPO}" target="_blank" rel="noopener">${esc(f.github)}</a> <span class="sep" aria-hidden="true">·</span> \u00A9 ${new Date().getFullYear()} PieBru</p>
    </div>`;
}

/* ============================================================
   Theme + interaction (event delegation)
   ============================================================ */
function setTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  try { localStorage.setItem("mono-theme", theme); } catch (e) {}
  // refresh the theme icon in the current top bar
  const btn = document.querySelector('.iconbtn.theme');
  if (btn) btn.innerHTML = (theme === "dark") ? SUN : MOON;
}

document.addEventListener("click", (e) => {
  // navigate via data-route (brand + internal section buttons)
  const nav = e.target.closest("[data-route]");
  if (nav) {
    e.preventDefault();
    const r = nav.getAttribute("data-route");
    if (r === "/") location.hash = "#/";
    else location.hash = "#/" + r.replace(/^\//, "");
    return;
  }
  const action = e.target.closest("[data-action]");
  if (action) {
    const a = action.getAttribute("data-action");
    if (a === "toggle-theme") {
      const cur = document.documentElement.getAttribute("data-theme");
      setTheme(cur === "light" ? "dark" : "light");
    }
    return;
  }
});

document.addEventListener("change", (e) => {
  const sel = e.target.closest("[data-action=select-lang]");
  if (!sel || !sel.value) return;
  const { section } = parseHash();
  // sources is shared -> choosing a language lands on that language's landing
  if (section === "drafts") location.hash = "#/" + sel.value + "/drafts";
  else location.hash = "#/" + sel.value;
});

window.addEventListener("hashchange", route);
window.addEventListener("DOMContentLoaded", route);
</script>
