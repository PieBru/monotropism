            desc: "Una guida amichevole per gli adulti attorno a un bambino autistico monotropico di 7\u201311 anni: genitori e caregiver, nonni, insegnanti di scuola primaria e allenatori sportivi. Copre casa, scuola e attivit\u00E0 sportive." },
      fr: { title: "Grandir de fa\u00E7on monotropique", audience: "Parents \u00B7 Enseignants \u00B7 Entra\u00EEneurs",

            desc: "Una gu\u00EDa cercana para los adultos en torno a un ni\u00F1o autista monotr\u00F3pico de 7 a 11 a\u00F1os: padres y cuidadores, abuelos, maestros de primaria y entrenadores deportivos. Abarca el hogar, la escuela y el deporte." },

            desc: "Ein freundlicher Leitfaden f\u00FCr die Erwachsenen um ein autistisches, monotropes Kind von 7\u201311 Jahren: Eltern und Betreuer, Gro\u00DFeltern, Grundschullehrer und Sport\u00FCbungsleiter. Behandelt Zuhause, Schule und Sportplatz." }

const CAT_ORDER = ["theory", "practitioner", "family", "kids"];
const REPO = "https://github.com/PieBru/monotropism";

/* ---------- helpers ---------- */
const esc = (s) => String(s).replace(/[&<>"']/g, c =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const langName = (c) => I18N[c] ? I18N[c].name : c;
const langFlag = (c) => (LANGS.find(l => l.code === c) || {}).flag || "";
const artifacts = (stem, code) => {
  const suf = LANG_SUFFIX[code] || "";
  return { html: "outputs/" + stem + suf + ".html", pdf: "outputs/" + stem + suf + ".pdf" };
};
const countFor = (code) => DOCS.filter(d => d.langs.includes(code)).length;
const fmt = (str, n) => str.replace("{n}", n);

/* ---------- shared SVG ---------- */
const MARK = `<svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
  <circle cx="16" cy="16" r="14" fill="none" stroke="currentColor" stroke-width="1" opacity="0.22"/>
  <circle cx="16" cy="16" r="9.2" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <circle cx="16" cy="16" r="4.8" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <circle cx="16" cy="16" r="2" fill="currentColor"/>
</svg>`;
const SUN = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M19.4 4.6l-1.8 1.8M6.4 17.6l-1.8 1.8"/></svg>`;
const MOON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>`;
const CHEV_LEFT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>`;
const GLOBE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9.3"/><path d="M3 12h18M12 2.7c2.6 2.4 4 5.9 4 9.3s-1.4 6.9-4 9.3c-2.6-2.4-4-5.9-4-9.3s1.4-6.9 4-9.3z"/></svg>`;
const CHECK = `<svg class="mi" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;

/* ============================================================
   Routing
   ============================================================ */
function route() {
  const hash = location.hash.replace(/^#\/?/, ""); // e.g. "en" or ""
  const code = hash && I18N[hash] ? hash : "";
  if (code) renderLang(code);
  else renderHome();
  window.scrollTo({ top: 0, behavior: "auto" });
}

/* ============================================================
   Top bar
   ============================================================ */
function renderTopbar(code) {
  const i18n = code ? I18N[code] : I18N.en;
  const isDark = document.documentElement.getAttribute("data-theme") !== "light";
  const themeIcon = isDark ? SUN : MOON;

  const back = code
    ? `<button class="iconbtn" data-route="/" aria-label="${esc(i18n.allLanguages)}" title="${esc(i18n.allLanguages)}">${CHEV_LEFT}</button>`
    : "";

  const langSwitch = code ? `
    <div class="langswitch">
      <button class="iconbtn" data-action="toggle-lang" aria-haspopup="true" aria-expanded="false" aria-label="${esc(i18n.languages)}">
        ${GLOBE}<span class="code">${esc(code.toUpperCase())}</span>
      </button>
      <div class="langmenu" id="langmenu" hidden>
        ${LANGS.map(l => `
          <button class="langmenu-item ${l.code === code ? "active" : ""}" data-route="/${l.code}">
            <span class="flag">${l.flag}</span>${esc(I18N[l.code].name)}${l.code === code ? CHECK : ""}
          </button>`).join("")}
      </div>
    </div>` : "";

  document.getElementById("topbar").innerHTML = `
    <div class="tb-left">
      ${back}
      <a class="brand" href="#/" data-route="/" aria-label="Monotropism \u2014 ${esc(i18n.home)}">
        ${MARK}<span class="brand-name">Monotropism</span>
      </a>
    </div>
    <div class="tb-right">
      ${langSwitch}
      <button class="iconbtn theme" data-action="toggle-theme" aria-label="${esc(i18n.theme)}" title="${esc(i18n.theme)}">${themeIcon}</button>
    </div>`;
}

/* ============================================================
   Home (language selection)
   ============================================================ */
function renderHome() {
  document.documentElement.lang = "en";
  document.title = "Monotropism \u2014 An Interest-Based Account of Autism";

  renderTopbar(""); // top bar without back / lang switch

  const cards = LANGS.map(l => {
    const n = countFor(l.code);
    return `<button class="lang-card" data-route="/${l.code}">
        <span class="flag" aria-hidden="true">${l.flag}</span>
        <span class="ln">${esc(I18N[l.code].name)}</span>
        <span class="lc">${n} ${esc(I18N[l.code].draftsWord)}</span>
        <span class="go" aria-hidden="true">\u2192</span>
      </button>`;
  }).join("");

  document.getElementById("app").innerHTML = `
    <section class="home view">
      <div class="wrap">
        <div class="home-hero">
          <span class="mark-big">${MARK}</span>
          <h1>Monotropism</h1>
          <p class="tagline">${esc(I18N.en.tagline)}</p>
          <p class="eyebrow">${esc(I18N.en.choose)}</p>
          <p class="lead">${esc(I18N.en.lead)}</p>
        </div>
        <div class="lang-grid">${cards}</div>
      </div>
    </section>`;

  renderFooter("en");
}

/* ============================================================
   Language landing view
   ============================================================ */
function renderLang(code) {
  const t = I18N[code];
  document.documentElement.lang = code;
  document.title = "Monotropism \u2014 " + t.tagline;

  renderTopbar(code);

  // group available docs by category, in CAT_ORDER
  const available = DOCS.filter(d => d.langs.includes(code));
  const groups = CAT_ORDER
    .map(cat => ({ cat, docs: available.filter(d => d.cat === cat) }))
    .filter(g => g.docs.length);

  const groupsHtml = groups.map(g => `
      <div class="cat">
        <h3 class="cat-title">${esc(t.cat[g.cat] || g.cat)}</h3>
        <div class="cat-list">
          ${g.docs.map(d => docCard(d, code, t)).join("")}
        </div>
      </div>`).join("");

  document.getElementById("app").innerHTML = `
    <section class="langview view">
      <div class="wrap">
        <div class="lang-hero">
          <span class="mark-big">${MARK}</span>
          <h1>Monotropism</h1>
          <p class="tagline">${esc(t.tagline)}</p>
          <p class="intro">${esc(t.intro)}</p>
        </div>

        <div class="section-head">
          <h2>${esc(t.draftsHead)}</h2>
          <span class="count">${esc(fmt(t.draftsCount, available.length))}</span>
        </div>
        <div class="divider"></div>

        ${groupsHtml}
      </div>
    </section>`;

  renderFooter(code);
}

function docCard(doc, code, t) {
  const c = doc.content[code];
  const { html, pdf } = artifacts(doc.stem, code);
  return `
    <article class="doc">
      <div class="doc-main">
        <span class="audience">${esc(c.audience)}</span>
        <h3 class="doc-title">${esc(c.title)}</h3>
        <p class="doc-desc">${esc(c.desc)}</p>
      </div>
      <div class="doc-actions">
        <a class="btn btn-primary" href="${esc(html)}" target="_blank" rel="noopener">${esc(t.read)} <span class="ar" aria-hidden="true">\u2192</span></a>
        <a class="btn btn-ghost" href="${esc(pdf)}" target="_blank" rel="noopener" download>${esc(t.pdf)} <span class="ar" aria-hidden="true">\u2193</span></a>
      </div>
    </article>`;
}

/* ---------- footer ---------- */
function renderFooter(code) {
  const f = I18N[code] || I18N.en;
  document.getElementById("footer").innerHTML = `
    <div class="wrap">
      <p class="note">${esc(f.footer)}</p>
      <p class="ai">${esc(f.aiNote)}</p>
      <p><a href="${REPO}" target="_blank" rel="noopener">${esc(f.github)}</a></p>
      <p>\u00A9 ${new Date().getFullYear()} PieBru</p>
    </div>`;
}

/* ============================================================
   Theme + interaction (event delegation)
   ============================================================ */
function setTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  try { localStorage.setItem("mono-theme", theme); } catch (e) {}
  // refresh the theme icon in the current top bar
  const btn = document.querySelector('.iconbtn.theme');
  if (btn) btn.innerHTML = (theme === "dark") ? SUN : MOON;
}

function toggleLangMenu(open) {
  const menu = document.getElementById("langmenu");
  const btn = document.querySelector('[data-action="toggle-lang"]');
  if (!menu || !btn) return;
  const willOpen = (open === undefined) ? menu.hidden : open;
  menu.hidden = !willOpen;
  btn.setAttribute("aria-expanded", willOpen ? "true" : "false");
}

document.addEventListener("click", (e) => {
  // navigate via data-route
  const nav = e.target.closest("[data-route]");
  if (nav) {
    e.preventDefault();
    toggleLangMenu(false);
    const r = nav.getAttribute("data-route");
    if (r === "/") location.hash = "#/";
    else location.hash = "#/" + r.replace(/^\//, "");
    return;
  }

  const action = e.target.closest("[data-action]");
  if (action) {
    const a = action.getAttribute("data-action");
    if (a === "toggle-theme") {
      const cur = document.documentElement.getAttribute("data-theme");
      setTheme(cur === "light" ? "dark" : "light");
    } else if (a === "toggle-lang") {
      toggleLangMenu();
      e.stopPropagation();
    }
    return;
  }

  // close lang menu on outside click
  if (!e.target.closest(".langswitch")) toggleLangMenu(false);
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") toggleLangMenu(false);
});

window.addEventListener("hashchange", route);
window.addEventListener("DOMContentLoaded", route);
</script>
