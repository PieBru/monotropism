<style>
@page {
  size: A4;
  margin: 20mm 18mm 22mm 18mm;
  @bottom-center {
    content: counter(page) " / " counter(pages);
    font-family: "Noto Sans", "Liberation Sans", sans-serif;
    font-size: 9pt;
    color: #888;
  }
}
html { font-size: 11pt; }
body {
  font-family: "Noto Serif", "Liberation Serif", Georgia, serif;
  line-height: 1.55;
  color: #1a1a1a;
  text-align: left;
  max-width: 100%;
  hyphens: auto;
}
h1, h2, h3, h4, h5 {
  font-family: "Noto Sans", "Liberation Sans", Helvetica, Arial, sans-serif;
  color: #1f2d3d;
  line-height: 1.25;
  font-weight: 600;
}
h1 {
  font-size: 1.9rem;
  border-bottom: 3px solid #2c5282;
  padding-bottom: 0.3rem;
  margin-top: 0;
  page-break-after: avoid;
}
h2 {
  font-size: 1.4rem;
  margin-top: 1.6rem;
  border-bottom: 1px solid #cbd5e0;
  padding-bottom: 0.15rem;
  page-break-after: avoid;
}
h3 {
  font-size: 1.15rem;
  margin-top: 1.2rem;
  color: #2c5282;
  page-break-after: avoid;
}
h4 { font-size: 1.02rem; margin-top: 1rem; page-break-after: avoid; }
p { margin: 0.5rem 0; orphans: 3; widows: 3; }
a { color: #2b6cb0; text-decoration: none; word-break: break-word; }
strong { color: #111; }
em { color: #222; }
blockquote {
  margin: 0.8rem 0;
  padding: 0.5rem 1rem;
  border-left: 4px solid #2c5282;
  background: #f7fafc;
  color: #2d3748;
  font-style: italic;
  page-break-inside: avoid;
}
blockquote p { margin: 0.3rem 0; }
hr {
  border: none;
  border-top: 1px solid #cbd5e0;
  margin: 1.4rem 0;
}
ul, ol { margin: 0.4rem 0 0.6rem 0; padding-left: 1.4rem; }
li { margin: 0.22rem 0; }
li::marker { color: #2c5282; }
code {
  font-family: "DejaVu Sans Mono", "Liberation Mono", monospace;
  font-size: 0.88em;
  background: #edf2f7;
  padding: 0.1em 0.3em;
  border-radius: 3px;
  color: #1a202c;
}
pre {
  background: #edf2f7;
  padding: 0.8rem 1rem;
  border-radius: 5px;
  overflow-x: auto;
  font-size: 0.85em;
  line-height: 1.4;
  page-break-inside: avoid;
}
pre code { background: none; padding: 0; }
table {
  border-collapse: collapse;
  width: 100%;
  margin: 0.9rem 0;
  font-size: 0.9rem;
  page-break-inside: auto;
}
thead { display: table-header-group; }
tr { page-break-inside: avoid; }
th, td {
  border: 1px solid #cbd5e0;
  padding: 0.45rem 0.6rem;
  text-align: left;
  vertical-align: top;
}
th {
  background: #2c5282;
  color: #fff;
  font-family: "Noto Sans", sans-serif;
  font-weight: 600;
}
tbody tr:nth-child(even) { background: #f7fafc; }
/* footnote-style reference lists and superscripts already inline; keep tidy */
sup { font-size: 0.7em; color: #2b6cb0; }
</style>
