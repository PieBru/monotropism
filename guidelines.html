[data-theme="dark"]{

}
[data-theme="light"]{
  --bg:#f6f7f9; --surface:#ffffff; --surface-2:#ffffff; --surface-hi:#f2f4f8;
  --fg:#1a1d24; --fg-soft:#4c5363; --fg-faint:#838b9a;
  --border:#e4e8ee; --border-soft:#eef1f5;
  --accent:#2f5fae; --accent-2:#264f93; --accent-bg:rgba(47,95,174,.09); --accent-ring:rgba(47,95,174,.30);
  --teal:#0b7d7d; --teal-bg:rgba(11,125,125,.09);
  --green:#1b7a3d; --amber:#9a6b00; --red:#b3261e; --violet:#6b4ba0;
  --shadow:0 12px 40px rgba(20,30,55,.10);
}
*{box-sizing:border-box;}
body{
  margin:0; color:var(--fg); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:16px; line-height:1.6;
  background:
    radial-gradient(1100px 560px at 50% -8%, var(--accent-bg), transparent 60%),
    linear-gradient(180deg,var(--bg),var(--bg));
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px;}

/* topbar */
.topbar{position:sticky;top:0;z-index:50;backdrop-filter:saturate(140%) blur(12px);
  background:color-mix(in srgb,var(--bg) 78%,transparent);border-bottom:1px solid var(--border-soft);}
.topbar-inner{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 22px;}
.brand{display:inline-flex;align-items:center;gap:9px;color:var(--fg);font-family:var(--font-serif);font-weight:600;font-size:18px;letter-spacing:-.01em;}
.brand:hover{text-decoration:none;color:var(--fg);}
.mark{display:inline-block;width:1em;height:1em;color:var(--accent);flex:none;}
.brand .mark{font-size:22px;}
.brand-stack{display:flex;flex-direction:column;line-height:1.12;}
.brand-name{font-weight:600;font-size:18px;letter-spacing:-.01em;}
.brand-motto{font-family:var(--font-sans);font-size:11px;font-weight:500;color:var(--fg-faint);letter-spacing:.01em;margin-top:1px;}
.tb-right{display:flex;align-items:center;gap:10px;}
.btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-sans);font-size:14px;font-weight:600;padding:9px 15px;border-radius:10px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:background .16s ease,color .16s ease,border-color .16s ease,transform .08s ease;}
.btn:active{transform:translateY(1px);}
.btn:hover{color:var(--fg);border-color:var(--accent);}
.btn-ghost{background:transparent;color:var(--fg-soft);border-color:var(--border);}
.btn-ghost:hover{color:var(--fg);border-color:var(--accent);text-decoration:none;}
.btn-ghost.active{color:var(--accent);border-color:var(--accent);background:var(--accent-bg);}
.btn .ar{font-size:12px;opacity:.85;}
.langselect{font-family:var(--font-sans);font-size:14px;font-weight:600;color:var(--fg);background:var(--surface);border:1px solid var(--border);
  border-radius:10px;height:38px;padding:0 30px 0 12px;cursor:pointer;appearance:none;-webkit-appearance:none;-moz-appearance:none;
  background-image:linear-gradient(45deg,transparent 50%,var(--fg-soft) 50%),linear-gradient(135deg,var(--fg-soft) 50%,transparent 50%);
  background-position:calc(100% - 14px) 17px,calc(100% - 9px) 17px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;
  transition:border-color .16s ease,color .16s ease;}
.langselect:hover{border-color:var(--accent);color:var(--fg);}
.langselect:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ring);}
.iconbtn{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:38px;height:38px;padding:0;font-family:var(--font-sans);font-size:14px;font-weight:500;color:var(--fg-soft);background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:background .18s ease,color .18s ease,border-color .18s ease,transform .08s ease;}
.iconbtn:hover{color:var(--fg);border-color:var(--accent);}
.iconbtn svg{width:17px;height:17px;}
@media (max-width:640px){
  .topbar-inner{flex-wrap:wrap;row-gap:8px;}
  .tb-right{flex-wrap:wrap;justify-content:flex-end;row-gap:8px;}
  .brand .brand-name{display:none;}
}

/* hero */
.hero{padding:46px 0 14px;text-align:center;}
.eyebrow{color:var(--teal);font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin:0 0 10px;}
.hero h1{font-size:clamp(28px,5vw,42px);line-height:1.1;margin:0 0 14px;letter-spacing:-.02em;}
.hero p.lead{color:var(--fg-soft);max-width:720px;margin:0 auto;font-size:17px;}



/* grid */
.grid-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:6px;margin:0 0 28px;overflow:auto;}
table.matrix{border-collapse:separate;border-spacing:5px;width:100%;min-width:880px;}
.matrix th,.matrix td{vertical-align:middle;text-align:center;}
.col-head{font-size:12px;font-weight:600;color:var(--fg-soft);padding:8px 4px 4px;line-height:1.2;}
.col-head .sub{display:block;font-size:10.5px;color:var(--fg-faint);font-weight:500;margin-top:2px;}
.row-head{text-align:left;padding:6px 12px 6px 6px;font-weight:600;font-size:13.5px;white-space:nowrap;}
.row-head .ages{display:block;font-size:11px;color:var(--fg-faint);font-weight:500;margin-top:1px;}
.corner{font-size:11px;color:var(--fg-faint);padding:4px;}

/* cumulative tiles */
.cum-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  min-height:42px;border-radius:8px;font-size:11.5px;font-weight:600;padding:6px 4px;}
.cum-col{background:var(--accent-bg);border:1px solid var(--accent);color:var(--accent);}
.cum-col a{color:inherit;}
.cum-col.planned{background:transparent;border-style:dashed;border-color:var(--fg-faint);color:var(--fg-faint);}
.cum-row{background:var(--accent-bg);border:1px solid var(--accent);color:var(--accent);}
.cum-row a{color:inherit;}
.cum-row.planned{background:transparent;border-style:dashed;border-color:var(--fg-faint);color:var(--fg-faint);}

/* cells */
.cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  min-height:54px;border-radius:8px;font-size:11.5px;font-weight:600;padding:6px 4px;position:relative;}
.cell .mk{font-size:15px;line-height:1;}
.cell .lbl{font-size:10px;font-weight:500;color:var(--fg-faint);letter-spacing:.02em;}
.cell.ready{background:var(--teal-bg);border:1px solid var(--teal);color:var(--fg);}
.cell.ready:hover{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg);}
.cell.ready .mk{color:var(--teal);}
.cell.planned{background:transparent;border:1px dashed var(--fg-faint);color:var(--fg-faint);}
.cell.na{background:var(--surface-2);color:var(--fg-faint);opacity:.45;}

/* action links inside a ready cell or summary tile (web / pdf) */
.glinks{display:inline-flex;gap:5px;align-items:center;justify-content:center;}
.glinks a{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  padding:2px 6px;border-radius:5px;border:1px solid var(--accent-ring);
  color:var(--accent);background:var(--surface);text-decoration:none;line-height:1.3;
  transition:background .15s ease,border-color .15s ease;}
.glinks a:hover{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);text-decoration:none;}

/* notes */
.notes{margin:8px 0 50px;}
.note{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--teal);
  border-radius:8px;padding:14px 18px;margin:0 0 12px;font-size:14.5px;color:var(--fg-soft);}
.note strong{color:var(--fg);}
.note h3{margin:0 0 6px;font-size:15px;color:var(--fg);}
.note p{margin:5px 0;}

footer{border-top:1px solid var(--border-soft);padding:26px 22px 50px;color:var(--fg-faint);font-size:13.5px;text-align:center;}
footer a{color:var(--fg-soft);}

const DIR = "outputs/guidelines/";
const REPO = "https://github.com/PieBru/monotropism";
const MARK = "<svg class=\"mark\" viewBox=\"0 0 32 32\" aria-hidden=\"true\">\n      <circle cx=\"16\" cy=\"16\" r=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1\" opacity=\"0.22\"/>\n      <circle cx=\"16\" cy=\"16\" r=\"9.2\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1\" opacity=\"0.4\"/>\n      <circle cx=\"16\" cy=\"16\" r=\"4.8\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" opacity=\"0.7\"/>\n      <circle cx=\"16\" cy=\"16\" r=\"2\" fill=\"currentColor\"/>\n    </svg>";
const SUN = "<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4.2\"/><path d=\"M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M19.4 4.6l-1.8 1.8M6.4 17.6l-1.8 1.8\"/></svg>";
const MOON = "<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z\"/></svg>";

function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }

let currentLang = "en";
function parseHash(){
  var parts = location.hash.replace(/^#\/?/, "").split("/").filter(Boolean);
  return (parts[0] && I18N[parts[0]]) ? parts[0] : "en";
}
function route(){
  currentLang = parseHash();
  render(currentLang);
  window.scrollTo(0,0);
}

function renderTopbar(code){
  var t = I18N[code];
  var isDark = document.documentElement.getAttribute("data-theme") !== "light";
  var langSelect = '<select class="langselect" data-action="select-lang" aria-label="' + esc(t.choose) + '">' +
    LANGS.map(function(l){ return '<option value="' + l.code + '"' + (l.code===code?" selected":"") + '>' + l.flag + '\u00A0' + esc(l.name) + '</option>'; }).join("") + '</select>';
  function nav(label, href, active){ return '<a class="btn btn-ghost' + (active?" active":"") + '" href="' + href + '">' + esc(label) + ' <span class="ar">\u2197</span></a>'; }
  document.getElementById("topbar").innerHTML =
    '<div class="topbar-inner">' +
      '<div class="tb-left">' +
        '<a class="brand" href="index.html#/' + code + '" aria-label="' + esc(t.brand) + '">' + MARK +
          '<span class="brand-stack"><span class="brand-name">' + esc(t.brand) + '</span><span class="brand-motto">' + esc(t.motto) + '</span></span></a>' +
      '</div>' +
      '<div class="tb-right">' + langSelect +
        nav(t.guidesBtn, "guidelines.html#/" + code, true) +
        nav(t.draftsBtn, "index.html#/" + code + "/drafts", false) +
        nav(t.sourcesBtn, "index.html#/sources", false) +
        '<button class="iconbtn theme" data-action="toggle-theme" aria-label="' + esc(t.theme) + '" title="' + esc(t.theme) + '">' + (isDark?SUN:MOON) + '</button>' +
      '</div>' +
    '</div>';
}

function renderGrid(t){
  var html = '<thead><tr><th class="corner">' + t.cornerTop + '</th>';
  COL_IDS.forEach(function(c){ var col=t.cols[c]; html += '<th class="col-head">' + esc(col.label) + '<span class="sub">' + esc(col.sub) + '</span></th>'; });
  html += '<th class="corner">' + t.cornerRowSummary + '</th></tr><tr><td class="corner">' + t.cornerColSummary + '</td>';
  COL_IDS.forEach(function(c){ html += '<td>' + colTile(c,t) + '</td>'; });
  html += '<td class="corner"></td></tr></thead><tbody>';
  ROW_IDS.forEach(function(r){
    var row=t.rows[r];
    html += '<tr><td class="row-head">' + esc(row.label) + '<span class="ages">' + esc(row.ages) + '</span></td>';
    COL_IDS.forEach(function(c){ html += cellTile(r,c,t); });
    html += rowTile(r,t) + '</tr>';
  });
  html += '</tbody>';
  document.getElementById("grid").innerHTML = html;
}
function cellTile(r,c,t){
  var key=r+"-"+c;
  if(NA.has(key)) return '<td><div class="cell na"><span class="mk">\u2014</span></div></td>';
  if(READY.has(key)){ var row=t.rows[r], col=t.cols[c];
    return '<td><div class="cell ready" title="' + esc(row.label) + ' \u00D7 ' + esc(col.label) + ' \u2014 ' + esc(t.webAndPdf) + '"><span class="mk">\u2713</span><span class="glinks"><a href="' + DIR + 'g-' + key + '.html" target="_blank" rel="noopener">' + esc(t.web) + '</a><a href="' + DIR + 'g-' + key + '.pdf" target="_blank" rel="noopener">' + esc(t.pdf) + '</a></span></div></td>'; }
  return '<td><div class="cell planned" title="' + esc(t.titlePlanned) + '"><span class="mk">\u00B7</span><span class="lbl">' + esc(t.planned) + '</span></div></td>';
}
function rowTile(r,t){
  var key="row-"+r;
  if(!READY.has(key)) return '<td><div class="cum-tile cum-row planned" title="' + esc(t.titlePlanned) + '">' + esc(t.all) + '</div></td>';
  return '<td><div class="cum-tile cum-row" title="' + esc(t.summaryRow) + ' \u2014 ' + esc(t.webAndPdf) + '"><span class="cum-label">' + esc(t.all) + '</span><span class="glinks"><a href="' + DIR + 'g-' + key + '.html" target="_blank" rel="noopener">' + esc(t.web) + '</a><a href="' + DIR + 'g-' + key + '.pdf" target="_blank" rel="noopener">' + esc(t.pdf) + '</a></span></div></td>';
}
function colTile(c,t){
  var key="col-"+c;
  if(!READY.has(key)) return '<div class="cum-tile cum-col planned" title="' + esc(t.titlePlanned) + '">' + esc(t.allStages) + '</div>';
  return '<div class="cum-tile cum-col" title="' + esc(t.summaryCol) + ' \u2014 ' + esc(t.webAndPdf) + '"><span class="cum-label">' + esc(t.allStages) + '</span><span class="glinks"><a href="' + DIR + 'g-' + key + '.html" target="_blank" rel="noopener">' + esc(t.web) + '</a><a href="' + DIR + 'g-' + key + '.pdf" target="_blank" rel="noopener">' + esc(t.pdf) + '</a></span></div>';
}

function render(code){
  var t = I18N[code];
  document.documentElement.lang = code;
  document.documentElement.dir = (code === "ar") ? "rtl" : "ltr";
  document.title = t.title;
  document.querySelector('meta[name="description"]').setAttribute("content", t.desc);
  renderTopbar(code);
  document.getElementById("hero").innerHTML = '<p class="eyebrow">' + t.eyebrow + '</p><h1>' + esc(t.h1) + '</h1><p class="lead">' + t.lead + '</p>';
  renderGrid(t);
  document.getElementById("notes").innerHTML =
    '<div class="note"><h3>' + t.note1h + '</h3><p>' + t.note1p + '</p></div>' +
    '<div class="note"><h3>' + t.note2h + '</h3><p>' + t.note2p + '</p></div>' +
    '<div class="note"><h3>' + t.note3h + '</h3><p>' + t.note3p + '</p></div>';
  document.getElementById("footer").innerHTML = t.foot + ' <a href="' + REPO + '" target="_blank" rel="noopener">' + esc(t.footLink) + '</a> \u00B7 ' + t.footTail;
}

document.addEventListener("click", function(e){
  var a = e.target.closest('[data-action="toggle-theme"]');
  if(a){
    var cur = document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
    document.documentElement.setAttribute("data-theme", cur);
    try{ localStorage.setItem("mono-theme", cur); }catch(_){}
    renderTopbar(currentLang);
  }
});
document.addEventListener("change", function(e){
  var sel = e.target.closest('[data-action="select-lang"]');
  if(sel && sel.value){ location.hash = "#/" + sel.value; }
});
window.addEventListener("hashchange", route);
route();

</script>
